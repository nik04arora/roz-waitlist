<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C3828"/>
      <stop offset="100%" stop-color="#142E22"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0E880"/>
      <stop offset="25%" stop-color="#C8A830"/>
      <stop offset="50%" stop-color="#887010"/>
      <stop offset="75%" stop-color="#D8C840"/>
      <stop offset="100%" stop-color="#C8A830"/>
    </linearGradient>
    <linearGradient id="goldline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#C8A830"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#C8A830" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C8A830" stop-opacity="0"/>
    </radialGradient>
    <!-- dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(180,110,20,0.15)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot grid -->
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.6"/>

  <!-- Ambient glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top gold line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#goldline)"/>

  <!-- Left content area -->
  <!-- AMFI badge -->
  <rect x="80" y="72" width="200" height="32" rx="16" fill="rgba(200,168,48,0.1)" stroke="rgba(200,168,48,0.25)" stroke-width="1"/>
  <circle cx="100" cy="88" r="4" fill="#C8A830"/>
  <text x="114" y="93" font-family="Georgia, serif" font-size="11" font-weight="600" fill="#9A8020" letter-spacing="2">AMFI · ARN-31388</text>

  <!-- roz wordmark -->
  <text x="80" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="148" font-weight="600" letter-spacing="-4" fill="url(#gold)">roz</text>

  <!-- Divider line -->
  <rect x="80" y="258" width="60" height="1.5" fill="#C8A830" opacity="0.5"/>

  <!-- Tagline -->
  <text x="80" y="308" font-family="Georgia, serif" font-size="22" font-weight="400" fill="#A0C0A0" letter-spacing="0.3">India's wealthy don't pick their own funds.</text>
  <text x="80" y="338" font-family="Georgia, serif" font-size="22" font-style="italic" font-weight="400" fill="#EAF0E4">Neither should you.</text>

  <!-- Sub copy -->
  <text x="80" y="394" font-family="Arial, sans-serif" font-size="15" font-weight="300" fill="rgba(160,192,160,0.8)">Real experts. Human-backed portfolios. Free to use.</text>

  <!-- URL -->
  <text x="80" y="550" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#9A8020" letter-spacing="1">rozinvest.com</text>

  <!-- Right side — phone card mockup -->
  <rect x="760" y="80" width="360" height="470" rx="40" fill="#142C20" stroke="rgba(200,148,58,0.2)" stroke-width="1.5"/>
  <!-- notch -->
  <rect x="880" y="80" width="120" height="22" rx="0 0 12 12" fill="#142C20"/>
  <rect x="896" y="86" width="88" height="12" rx="6" fill="#0E2018"/>

  <!-- Screen content -->
  <text x="790" y="142" font-family="Arial, sans-serif" font-size="10" fill="rgba(200,168,48,0.4)" letter-spacing="2">YOUR PORTFOLIO</text>
  <text x="790" y="170" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#EAF0E4">Arjun S.</text>

  <!-- SIP pill -->
  <rect x="790" y="184" width="110" height="22" rx="11" fill="rgba(200,148,58,0.1)" stroke="rgba(200,148,58,0.22)" stroke-width="1"/>
  <circle cx="804" cy="195" r="3" fill="#C8A830"/>
  <text x="812" y="199" font-family="Arial, sans-serif" font-size="10" fill="#D8C848">SIP Active</text>

  <!-- Portfolio card -->
  <rect x="790" y="218" width="310" height="100" rx="16" fill="#234530" stroke="rgba(200,148,58,0.15)" stroke-width="1"/>
  <rect x="790" y="218" width="310" height="1" rx="0" fill="rgba(245,223,160,0.3)"/>
  <text x="808" y="242" font-family="Arial, sans-serif" font-size="9" fill="rgba(245,240,232,0.35)" letter-spacing="1">PORTFOLIO VALUE</text>
  <text x="808" y="272" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#EAF0E4">₹1,24,500</text>
  <text x="808" y="294" font-family="Arial, sans-serif" font-size="11" fill="#8CCC9A">↑ +12.4% this year</text>

  <!-- Chart line -->
  <polyline points="790,360 840,350 880,345 920,330 960,318 1000,305 1040,288 1080,270 1100,258" fill="none" stroke="#C8A830" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="790,360 840,350 880,345 920,330 960,318 1000,305 1040,288 1080,270 1100,258 1100,380 790,380" fill="rgba(200,168,48,0.08)"/>

  <!-- Fund rows -->
  <line x1="790" y1="395" x2="1100" y2="395" stroke="rgba(245,240,232,0.05)" stroke-width="1"/>
  <text x="790" y="418" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#EAF0E4">Parag Parikh Flexi Cap</text>
  <text x="1090" y="418" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#8CCC9A" text-anchor="end">+18.2%</text>
  <line x1="790" y1="432" x2="1100" y2="432" stroke="rgba(245,240,232,0.05)" stroke-width="1"/>
  <text x="790" y="455" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#EAF0E4">Mirae Asset Large Cap</text>
  <text x="1090" y="455" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#8CCC9A" text-anchor="end">+14.6%</text>
  <line x1="790" y1="469" x2="1100" y2="469" stroke="rgba(245,240,232,0.05)" stroke-width="1"/>
  <text x="790" y="492" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#EAF0E4">Axis Midcap Fund</text>
  <text x="1090" y="492" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#8CCC9A" text-anchor="end">+22.1%</text>

  <!-- Bottom rule -->
  <rect x="0" y="590" width="1200" height="1" fill="rgba(200,168,48,0.12)"/>
  <text x="80" y="615" font-family="Arial, sans-serif" font-size="11" fill="rgba(160,192,160,0.5)">Mutual Fund investments are subject to market risks. Please read all scheme related documents carefully.</text>
</svg>
